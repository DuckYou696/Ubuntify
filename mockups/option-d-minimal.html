<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntify - Mockup D</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
        }
        .container {
            text-align: center;
            padding: 50px 60px;
            border: 1px solid #2a2a2a;
            background: linear-gradient(180deg, #0f0f0f 0%, #141414 100%);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff6600, transparent);
        }
        .ascii {
            font-size: 12px;
            line-height: 1.3;
            white-space: pre;
            color: #b3b3b3;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .subtitle {
            margin-top: 25px;
            font-size: 10px;
            color: #666;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: subtitleReveal 1.5s ease-out 0.5s both;
        }
        @keyframes subtitleReveal {
            from { opacity: 0; letter-spacing: 20px; }
            to { opacity: 1; letter-spacing: 5px; }
        }
        .label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f0f0f;
            padding: 0 15px;
            font-size: 9px;
            color: #ff6600;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="label">Option D: Minimal Monospace</span>
        <div class="ascii"> _   _ _                 _   _  __       
| | | | |__  _   _ _ __ | |_(_)/ _|_   _ 
| | | | '_ \| | | | '_ \| __| | |_| | | |
|_| |_| |_) | |_| | | | | |_| |  _| |_| |
 \___/|_.__/ \__,_|_| |_|\__|_|_|  \__, |
                                   |___/ </div>
        <div class="subtitle">Mac Pro Conversion and Management Tool</div>
    </div>
</body>
</html>
